<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>cuadrado rojo centrado</title>
    <style>
        body
        {
           margin: 0;
           height: 100vh;
           display: flex;
           justify-content: center;
           align-items: center;
           background-color: rgb(240, 232, 232);
        }
        .cuadrado {
            width: 300px;
            height: 300px;
            background-color: pink;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .texto {
            color: black;
            font-size: 30px;
            font-weight: bold;
        }
        
    </style>
</head>
<body>
    <div class="cuadrado">
        <span class="texto">karen reverberi hola</span>
    </div>
</body>
</html>
