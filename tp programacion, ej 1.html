<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta Perfil</title>

    <style>
        .contenedor {
                      display: flex;
                      justify-content: center;
                      align-items: stretch;
                      gap: 20px;
                      flex-wrap: wrap;
                      padding: 20px;
        }
        body {
              display: flex;
              justify-content: center;
              align-items: center;
              height: 100vh;
              background-color: rgb(248, 216, 237);
         } 
        #tarjeta {
                  background: whitesmoke;
                  padding: 20px;
                  width: 300px;
                  min-height: 400px;
                  text-align: center;
                  border-radius: 15px;
                  box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
                  transition: transform 0.3s ease;
                  box-shadow: 0.3s ease;
        }
        #tarjeta:hover {
                        transform: translateY(-10px);
                        box-shadow: 0px 12px 25px rgba(0,0,0,0.3);
        }
        .foto {
               width: 100px;
               height: 100px;
               border-radius: 50%;
               object-fit: cover;
               margin-bottom: 10px;
        }
        .nombre {
                  font-size: 22px;
                  font-weight: bold;
                  margin: 10px;
        }

        .rol {
              color: gray;
              margin-bottom: 10px;
        }
        .descripcion {
                     font-size: 14px;
                     margin: 10px;
                     color: #555;
        }
        .estadisticas {
                       display: flex;
                       justify-content: space-around;
                       margin-top: 15px;
        }
        #formulario {
                      width: 300px;
                      min-height: 400px;
                      margin: 20px auto;
                      padding: 20px;
                      border-radius: 15px;
                      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
                      background-color: whitesmoke;
                      text-align: center;
                      transition: transform 0.3s;
        }
        form {
               display: flex;
               flex-direction: column;
               align-items: center;
        }

        #formulario:hover {
                             transform: scale(1.03);
        }

        .titulo-form {
                         margin-bottom: 15px;
        }  

        .input {
                  width: 90%;
                  padding: 10px;
                  margin: 8px 0;
                  border-radius: 10px;
                  border: 1px solid #ccc;
        }

        .checkbox {
                     font-size: 14px;
                     display: block;
                     margin: 10px 0;
                     text-align: center;
        }

        .btn {
                 width: 100%;
                 padding: 10px;
                 border: none;
                 border-radius: 10px;
                 background-color: pink;
                 color: fuchsia;
                 cursor: pointer;
                transition: background 0.3s;
        }
        .btn:hover {
                     background-color: pink;
        }
        @media (max-width: 600px) {
          .contenedor {
                         flex-direction: column;
           }

           #tarjeta, #formulario {
                                  width: 90%;
            }
        }
    </style>
</head>
<body>
<div class="contenedor">

    <div id="tarjeta">
        <img src="foto.jpeg" class="foto">

        <h2 class="nombre">Karen Barraza</h2>
        <p class="rol">futura Programadora</p>
        <p class="descripcion">Aprendiendo desarrollo web y mejorarando mis habilidades.</p>

        <div class="estadisticas">
            <div>
                <p>1,1k</p>
                <span>Seguidores</span>
            </div>
            <div>
                <p>557</p>
                <span>Siguiendo</span>
            </div>
            <div>
                <p>7,8k</p>
                <span>me gustas</span>
            </div>
        </div>
    </div>

    <div id="formulario">
       <h2 class="titulo-form">Registro</h2>

       <form>
          <input type="email" placeholder="Email" class="input">
          <input type="password" placeholder="Contraseña" class="input">
          <input type="password" placeholder="Repetir contraseña" class="input">

          <label class="checkbox">
              <input type="checkbox"> Acepto términos y condiciones
          </label>

          <button type="submit" class="btn">Registrarse</button>
       </form>
    </div>
</div>
</body>
</html>
